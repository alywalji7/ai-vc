name: Python Linting

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff flake8 black
    - name: Lint with ruff
      run: |
        ruff check . --exclude tests/
    - name: Lint with flake8
      run: |
        flake8 . --count --exclude=tests/ --select=E9,F63,F7,F82 --show-source --statistics
    - name: Lint with black
      run: |
        black . --check --exclude="tests/"