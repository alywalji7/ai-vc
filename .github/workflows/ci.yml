name: CI

on:
  push:
    branches: [main, prompt8-audit]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist
          pip install kubernetes
          pip install -r requirements.txt
      
      - name: Run backend tests
        run: |
          cd examples/backend           # real backend folder
          pip install -r requirements.txt
          pytest -q tests/
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          
  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest kubernetes
          pip install -r requirements.txt
      
      - name: Run integration tests (including k8s checks)
        run: |
          python -m pytest tests/test_compliance_integration.py tests/test_k8s_services.py -v
          
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and cache Docker images
        run: |
          # Build backend
          if [ -d "examples/backend" ] && [ -f "examples/backend/Dockerfile" ]; then
            docker build -t aivc/backend:latest examples/backend/
          elif [ -d "services/backend" ] && [ -f "services/backend/Dockerfile" ]; then
            docker build -t aivc/backend:latest services/backend/
          else
            echo "No backend Dockerfile found, skipping backend image build"
            touch trivy-results-backend.sarif
          fi
          
          # Build frontend
          if [ -d "examples/frontend" ] && [ -f "examples/frontend/Dockerfile" ]; then
            docker build -t aivc/frontend:latest examples/frontend/
          elif [ -d "services/frontend" ] && [ -f "services/frontend/Dockerfile" ]; then
            docker build -t aivc/frontend:latest services/frontend/
          else
            echo "No frontend Dockerfile found, skipping frontend image build"
            touch trivy-results-frontend.sarif
          fi
          
          # Only build other services if they exist
          if [ -d "services/graph_ingest" ] && [ -f "services/graph_ingest/Dockerfile" ]; then
            docker build -t aivc/graph-ingest:latest services/graph_ingest/
          else
            echo "No graph-ingest Dockerfile found, skipping graph-ingest image build"
            touch trivy-results-graph-ingest.sarif
          fi
      
      - name: Run Trivy vulnerability scanner on backend image
        id: trivy-backend
        continue-on-error: true
        run: |
          if docker image inspect aivc/backend:latest >/dev/null 2>&1; then
            trivy image aivc/backend:latest --format sarif --output trivy-results-backend.sarif --severity CRITICAL,HIGH --ignore-unfixed
            echo "Backend image scanned"
            exit 0
          else
            echo "Backend image not found, skipping scan"
            echo '{"runs":[]}' > trivy-results-backend.sarif
            exit 0
          fi
          
      - name: Run Trivy vulnerability scanner on frontend image
        id: trivy-frontend
        continue-on-error: true
        run: |
          if docker image inspect aivc/frontend:latest >/dev/null 2>&1; then
            trivy image aivc/frontend:latest --format sarif --output trivy-results-frontend.sarif --severity CRITICAL,HIGH --ignore-unfixed
            echo "Frontend image scanned"
            exit 0
          else
            echo "Frontend image not found, skipping scan"
            echo '{"runs":[]}' > trivy-results-frontend.sarif
            exit 0
          fi
          
      - name: Run Trivy vulnerability scanner on graph-ingest image
        id: trivy-graph-ingest
        continue-on-error: true
        run: |
          if docker image inspect aivc/graph-ingest:latest >/dev/null 2>&1; then
            trivy image aivc/graph-ingest:latest --format sarif --output trivy-results-graph-ingest.sarif --severity CRITICAL,HIGH --ignore-unfixed
            echo "Graph-ingest image scanned"
            exit 0
          else
            echo "Graph-ingest image not found, skipping scan"
            echo '{"runs":[]}' > trivy-results-graph-ingest.sarif
            exit 0
          fi
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results-*.sarif'
  
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd examples/frontend
          [ -f package.json ] && npm ci || echo "No package.json found, skipping npm ci"
      
      - name: Run frontend tests
        run: |
          cd examples/frontend
          [ -f package.json ] && npm test || echo "No package.json found, skipping tests"
  
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests, security-scan]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install frontend dependencies
        run: |
          cd services/frontend
          npm ci
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright
        run: |
          npx playwright install --with-deps
      
      - name: Seed fixture data
        run: |
          python scripts/seed_fixtures.py
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      
      - name: Start all services
        run: |
          make dev &
          sleep 30  # Allow services to start
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      
      - name: Run Playwright tests
        run: |
          npx playwright test
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb