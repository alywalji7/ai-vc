name: CI

on:
  push:
    branches: [main, prompt8-audit]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist
          pip install kubernetes
          pip install -r requirements.txt
      
      - name: Run backend tests
        run: |
          python -m pytest -q services/*/tests/ tests/
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
          
  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest kubernetes
          pip install -r requirements.txt
      
      - name: Run integration tests (including k8s checks)
        run: |
          python -m pytest tests/test_compliance_integration.py tests/test_k8s_services.py -v
          
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and cache Docker images
        run: |
          docker build -t aivc/backend:latest services/backend/
          docker build -t aivc/frontend:latest services/frontend/
          docker build -t aivc/graph-ingest:latest services/graph_ingest/
          docker build -t aivc/radar:latest services/radar/
          docker build -t aivc/ic-sim:latest services/ic_sim/
          docker build -t aivc/scheduler:latest services/scheduler/
          docker build -t aivc/similarity-api:latest services/similarity_api/
          docker build -t aivc/term-sheet:latest services/term_sheet/
          docker build -t aivc/telemetry:latest services/telemetry/
      
      - name: Run Trivy vulnerability scanner on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'aivc/backend:latest'
          format: 'sarif'
          output: 'trivy-results-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: 'true'
          
      - name: Run Trivy vulnerability scanner on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'aivc/frontend:latest'
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: 'true'
          
      - name: Run Trivy vulnerability scanner on graph-ingest image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'aivc/graph-ingest:latest'
          format: 'sarif'
          output: 'trivy-results-graph-ingest.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: 'true'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results-*.sarif'
  
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd services/frontend
          npm ci
      
      - name: Run frontend tests
        run: |
          cd services/frontend
          npm test
  
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests, security-scan]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install frontend dependencies
        run: |
          cd services/frontend
          npm ci
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright
        run: |
          npx playwright install --with-deps
      
      - name: Seed fixture data
        run: |
          python scripts/seed_fixtures.py
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      
      - name: Start all services
        run: |
          make dev &
          sleep 30  # Allow services to start
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      
      - name: Run Playwright tests
        run: |
          npx playwright test
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb