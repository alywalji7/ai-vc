global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  smtp_from: 'alerts@aivc.com'
  smtp_smarthost: 'smtp.example.com:587'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'team-pager'
      continue: true
    - match:
        severity: warning
      receiver: 'slack-notifications'

receivers:
- name: 'team-pager'
  email_configs:
  - to: 'oncall@aivc.com'
    send_resolved: true
  webhook_configs:
  - url: 'https://example.com/pager'
    send_resolved: true
  slack_configs:
  - channel: '#alerts-critical'
    send_resolved: true
    title: '{{ template "slack.aivc.title" . }}'
    text: '{{ template "slack.aivc.text" . }}'

- name: 'slack-notifications'
  slack_configs:
  - channel: '#alerts'
    send_resolved: true
    title: '{{ template "slack.aivc.title" . }}'
    text: '{{ template "slack.aivc.text" . }}'

templates:
- '/etc/alertmanager/template/*.tmpl'