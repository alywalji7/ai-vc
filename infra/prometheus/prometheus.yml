global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - "rules/alerts.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Scrape configurations
scrape_configs:
  # Backend Service
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'

  # Radar Service
  - job_name: 'radar'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['radar:8050']
        labels:
          service: 'radar'

  # Similarity API Service
  - job_name: 'similarity-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['similarity-api:8090']
        labels:
          service: 'similarity-api'

  # IC Simulator Service
  - job_name: 'ic-simulator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ic-simulator:8060']
        labels:
          service: 'ic-simulator'

  # Term Sheet Service
  - job_name: 'term-sheet'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['term-sheet:8070']
        labels:
          service: 'term-sheet'

  # Telemetry Service
  - job_name: 'telemetry'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['telemetry:8100']
        labels:
          service: 'telemetry'

  # Graph Ingest Service
  - job_name: 'graph-ingest'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['graph-ingest:8080']
        labels:
          service: 'graph-ingest'

  # Scheduler Service
  - job_name: 'scheduler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['scheduler:8085']
        labels:
          service: 'scheduler'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']