global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  
  - job_name: "scheduler"
    static_configs:
      - targets: ["scheduler:9090"]  # Scheduler Prometheus metrics
  
  - job_name: "celery"
    static_configs:
      - targets: ["scheduler:9090"]  # Celery metrics via the scheduler service