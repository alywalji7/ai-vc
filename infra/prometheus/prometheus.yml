global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'rules/alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'radar'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['radar:8050']

  - job_name: 'ic_simulator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ic_simulator:8060']

  - job_name: 'term_sheet'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['term_sheet:8070']

  - job_name: 'graph_ingest'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['graph_ingest:8080']

  - job_name: 'similarity_api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['similarity_api:8090']

  - job_name: 'scheduler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['scheduler:8085']

  - job_name: 'telemetry'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['telemetry:8100']