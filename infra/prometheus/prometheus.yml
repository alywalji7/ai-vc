global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'

  - job_name: 'graph_ingest'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['graph_ingest:8091']
        labels:
          service: 'graph_ingest'

  - job_name: 'radar'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['radar:8050']
        labels:
          service: 'radar'

  - job_name: 'scheduler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['scheduler:8085']
        labels:
          service: 'scheduler'

  - job_name: 'similarity_api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['similarity_api:8090']
        labels:
          service: 'similarity_api'

  - job_name: 'telemetry'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['telemetry:8100']
        labels:
          service: 'telemetry'

  - job_name: 'term_sheet'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['term_sheet:8070']
        labels:
          service: 'term_sheet'

  - job_name: 'ic_sim'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ic_sim:8060']
        labels:
          service: 'ic_sim'

  # Node exporter for host metrics
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']