groups:
  - name: api_alerts
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (job, endpoint, le)) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }} - {{ $labels.endpoint }}"
          description: "P95 latency on {{ $labels.job }}'s {{ $labels.endpoint }} endpoint is above 500ms ({{ $value }}s)"

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (job, endpoint) / sum(rate(http_requests_total[5m])) by (job, endpoint) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }} - {{ $labels.endpoint }}"
          description: "Error rate on {{ $labels.job }}'s {{ $labels.endpoint }} endpoint is above 5% ({{ $value | humanizePercentage }})"

      - alert: HighTokenCost
        expr: sum(rate(openai_cost_total[1h])) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High OpenAI API cost"
          description: "OpenAI API cost is exceeding $5 per hour ({{ $value | humanizeDuration }})"

      - alert: HighGPUUtilization
        expr: nvidia_gpu_utilization > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU utilization on {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} utilization is above 90% ({{ $value }}%)"

      - alert: HighGPUMemoryUsage
        expr: nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU memory usage on {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} memory usage is above 90% ({{ $value }}%)"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"