groups:
  - name: service_alerts
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, sum by(job, le) (rate(http_request_duration_seconds_bucket[2m]))) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected for {{ $labels.job }}"
          description: "P95 latency for {{ $labels.job }} is above 500ms ({{ $value | printf `%.2f` }}s)"

      - alert: HighErrorRate
        expr: sum by(job) (rate(http_requests_total{status=~"5.."}[2m])) / sum by(job) (rate(http_requests_total[2m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected for {{ $labels.job }}"
          description: "Error rate for {{ $labels.job }} is above 5% ({{ $value | printf `%.2f` }})"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

  - name: resource_alerts
    rules:
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemFree_bytes - node_memory_Buffers_bytes - node_memory_Cached_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected for {{ $labels.job }}"
          description: "Memory usage is above 90% ({{ $value | printf `%.2f` }})"

      - alert: HighCPUUsage
        expr: avg by(job) (rate(node_cpu_seconds_total{mode!="idle"}[5m])) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected for {{ $labels.job }}"
          description: "CPU usage is above 90% ({{ $value | printf `%.2f` }})"

  - name: openai_alerts
    rules:
      - alert: HighTokenCost
        expr: sum by(job) (increase(openai_cost_total[15m])) > 5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High OpenAI API cost detected for {{ $labels.job }}"
          description: "OpenAI API cost for {{ $labels.job }} is above $5 in the last 15 minutes ({{ $value | printf `$%.2f` }})"

      - alert: HighTokenUsage
        expr: sum by(job) (rate(openai_tokens_total[10m])) > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High OpenAI token usage detected for {{ $labels.job }}"
          description: "OpenAI token usage for {{ $labels.job }} is above 5000 tokens per minute ({{ $value | printf `%.0f` }} tokens/min)"

  - name: gpu_alerts
    rules:
      - alert: HighGPUUtilization
        expr: gpu_utilization > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU utilization detected for {{ $labels.job }}"
          description: "GPU utilization is above 90% ({{ $value | printf `%.2f` }}%)"

      - alert: HighGPUMemoryUsage
        expr: gpu_memory_used / gpu_memory_total > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU memory usage detected for {{ $labels.job }}"
          description: "GPU memory usage is above 90% ({{ $value | printf `%.2f` }})"