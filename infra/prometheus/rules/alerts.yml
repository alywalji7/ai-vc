groups:
  - name: services
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job, instance)) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}/{{ $labels.instance }}"
          description: "P95 latency is above 1 second for {{ $labels.job }} on {{ $labels.instance }} for the past 2 minutes."
          
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}/{{ $labels.instance }}"
          description: "Error rate is above 1% for {{ $labels.job }} on {{ $labels.instance }} for the past 2 minutes."
          
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service down: {{ $labels.job }}/{{ $labels.instance }}"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."