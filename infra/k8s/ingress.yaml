apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aivc-ingress
  namespace: aivc
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-prefer-server-ciphers: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.${DOMAIN_NAME}";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"
    nginx.ingress.kubernetes.io/healthcheck-path: "/"
    nginx.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    nginx.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    nginx.ingress.kubernetes.io/success-codes: "200-299"
    nginx.ingress.kubernetes.io/healthy-threshold-count: "2"
    nginx.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    acme.cert-manager.io/http01-edit-in-place: "true"
spec:
  tls:
  - hosts:
    - "${DOMAIN_NAME}"
    - "api.${DOMAIN_NAME}"
    - "radar.${DOMAIN_NAME}"
    - "sim.${DOMAIN_NAME}"
    - "vectors.${DOMAIN_NAME}" 
    - "telemetry.${DOMAIN_NAME}"
    - "terms.${DOMAIN_NAME}"
    secretName: aivc-tls-cert
  rules:
  - host: "${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: "api.${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
  - host: "radar.${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: radar
            port:
              number: 80
  - host: "sim.${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: ic-sim
            port:
              number: 80
  - host: "vectors.${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: similarity-api
            port:
              number: 80
  - host: "telemetry.${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: telemetry
            port:
              number: 80
  - host: "terms.${DOMAIN_NAME}"
    http:
      paths:
      - path: "/"
        pathType: Prefix
        backend:
          service:
            name: term-sheet
            port:
              number: 80