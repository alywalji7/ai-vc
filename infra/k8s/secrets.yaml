apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: aivc
type: Opaque
data:
  # The values will be base64-encoded when the secrets are created
  # These values will be replaced by environment variables during deployment
  database-url: "${DATABASE_URL_BASE64}"
---
apiVersion: v1
kind: Secret
metadata:
  name: vector-db-credentials
  namespace: aivc
type: Opaque
data:
  qdrant-url: "${QDRANT_URL_BASE64}"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: aivc
type: Opaque
data:
  openai-api-key: "${OPENAI_API_KEY_BASE64}"
  sendgrid-api-key: "${SENDGRID_API_KEY_BASE64}"
  slack-webhook-url: "${SLACK_WEBHOOK_URL_BASE64}"