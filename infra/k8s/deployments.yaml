apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aivc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/aivc-frontend:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.${DOMAIN_NAME}"
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aivc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/aivc-backend:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database-url
        - name: REDIS_URL
          value: "redis://${REDIS_ENDPOINT}"
        - name: OPENTELEMETRY_ENDPOINT
          value: "http://jaeger-collector.observability:14268/api/traces"
        - name: S3_ENDPOINT
          value: "https://s3.${AWS_REGION}.amazonaws.com"
        - name: S3_BUCKET_NAME
          value: "${S3_BUCKET_NAME}"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radar
  namespace: aivc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radar
  template:
    metadata:
      labels:
        app: radar
    spec:
      containers:
      - name: radar
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/aivc-radar:latest
        ports:
        - containerPort: 8050
        - containerPort: 5000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database-url
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "https://s3.${AWS_REGION}.amazonaws.com"
        - name: MLFLOW_TRACKING_URI
          value: "http://localhost:5000"
        - name: AWS_S3_BUCKET
          value: "${S3_BUCKET_NAME}"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
        readinessProbe:
          httpGet:
            path: /health
            port: 8050
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: similarity-api
  namespace: aivc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: similarity-api
  template:
    metadata:
      labels:
        app: similarity-api
    spec:
      containers:
      - name: similarity-api
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/aivc-similarity-api:latest
        ports:
        - containerPort: 8090
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        env:
        - name: QDRANT_URL
          valueFrom:
            secretKeyRef:
              name: vector-db-credentials
              key: qdrant-url
        - name: TRANSFORMERS_CACHE
          value: "/app/.cache/huggingface"
        - name: HF_HOME
          value: "/app/.cache/huggingface"
        readinessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 10
---
