<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout a Company - AI.VC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .header img {
      width: 36px;
      height: 36px;
      margin-right: 10px;
    }
    .header h1 {
      font-size: 20px;
      margin: 0;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    textarea {
      height: 150px;
      resize: vertical;
    }
    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button.primary {
      background-color: #4CAF50;
      color: white;
    }
    button.secondary {
      background-color: #f44336;
      color: white;
    }
    button:hover {
      opacity: 0.8;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }
    .status.success {
      background-color: #d4edda;
      color: #155724;
    }
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="images/icon48.png" alt="AI.VC Logo">
    <h1>Scout a Company</h1>
  </div>
  
  <div class="form-group">
    <label for="url">URL:</label>
    <input type="text" id="url" readonly>
  </div>
  
  <div class="form-group">
    <label for="title">Company Name:</label>
    <input type="text" id="title">
  </div>
  
  <div class="form-group">
    <label for="notes">Notes (why is this company interesting?):</label>
    <textarea id="notes" placeholder="Add your notes about this company..."></textarea>
  </div>
  
  <div class="buttons">
    <button id="cancelButton" class="secondary">Cancel</button>
    <button id="saveButton" class="primary">Save to AI.VC</button>
  </div>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <script src="note.js"></script>
</body>
</html>
