global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aivc-platform'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load alert rules
rule_files:
  - "rules/*.yml"

# Scrape configurations for monitoring various services
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AWS Cost metrics
  - job_name: 'aws-cost-metrics'
    scrape_interval: 60s
    static_configs:
      - targets: ['aws-cost-exporter:9101']

  # OpenAI Usage metrics
  - job_name: 'openai-usage-metrics'
    scrape_interval: 60s
    static_configs:
      - targets: ['openai-usage-exporter:9102']

  # Graph Ingest service
  - job_name: 'graph-ingest'
    static_configs:
      - targets: ['graph-ingest:8091']

  # Backend service
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']

  # Radar service
  - job_name: 'radar'
    static_configs:
      - targets: ['radar:8040']

  # IC Simulator service
  - job_name: 'ic-simulator'
    static_configs:
      - targets: ['ic-simulator:8060']

  # Term Sheet service
  - job_name: 'term-sheet'
    static_configs:
      - targets: ['term-sheet:8070']

  # Similarity API service
  - job_name: 'similarity-api'
    static_configs:
      - targets: ['similarity-api:8090']

  # Scheduler service
  - job_name: 'scheduler'
    static_configs:
      - targets: ['scheduler:8085']

  # Beta Feedback service
  - job_name: 'beta-feedback'
    static_configs:
      - targets: ['beta-feedback:8200']

  # Telemetry service
  - job_name: 'telemetry'
    static_configs:
      - targets: ['telemetry:8100']