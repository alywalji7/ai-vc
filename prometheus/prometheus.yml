global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # Attach these labels to any time series or alerts
  external_labels:
    monitor: 'ai-vc-platform'

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/rules/*.yml'

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Collect Prometheus's own metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AWS Cost metrics
  - job_name: 'aws-cost-exporter'
    static_configs:
      - targets: ['aws-cost-exporter:9101']
    scrape_interval: 1h

  # OpenAI usage metrics
  - job_name: 'openai-usage-exporter'
    static_configs:
      - targets: ['openai-usage-exporter:9102']
    scrape_interval: 1h

  # Backend service
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8001']
    scrape_interval: 10s

  # Graph Ingest metrics
  - job_name: 'graph-ingest'
    static_configs:
      - targets: ['graph_ingest:8091']
    scrape_interval: 10s

  # Radar service metrics
  - job_name: 'radar'
    static_configs:
      - targets: ['radar:8051']
    scrape_interval: 10s

  # Similarity API metrics
  - job_name: 'similarity-api'
    static_configs:
      - targets: ['similarity_api:8091']
    scrape_interval: 10s

  # Term Sheet service metrics
  - job_name: 'term-sheet'
    static_configs:
      - targets: ['term_sheet:8071']
    scrape_interval: 10s

  # IC Simulator metrics
  - job_name: 'ic-simulator'
    static_configs:
      - targets: ['ic_sim:8061']
    scrape_interval: 10s