global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'category', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-notifications'
  routes:
    - match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h
      receiver: 'slack-notifications'
    - match:
        category: finops
      group_by: ['alertname', 'category']
      receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    webhook_configs:
      - url: 'http://slack-notifier:9093/'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']