groups:
- name: aws_cost_alerts
  rules:
  - alert: AWSMonthlyCostExceeded
    expr: aws_monthly_cost_estimate > 1000
    for: 1h
    labels:
      severity: warning
      category: finops
    annotations:
      summary: "AWS Monthly Cost Estimate Exceeded"
      description: "The estimated AWS cost for the current month is ${{ $value | printf '%.2f' }}, which exceeds the budget of $1,000."

  - alert: AWSMonthlyCostCritical
    expr: aws_monthly_cost_estimate > 1500
    for: 30m
    labels:
      severity: critical
      category: finops
    annotations:
      summary: "AWS Monthly Cost Critical"
      description: "URGENT: The estimated AWS cost for the current month is ${{ $value | printf '%.2f' }}, which significantly exceeds the budget of $1,000."

  - alert: AWSDailyCostExceeded
    expr: aws_daily_cost > 50
    for: 30m
    labels:
      severity: warning
      category: finops
    annotations:
      summary: "AWS Daily Cost Exceeded"
      description: "The AWS cost for today is ${{ $value | printf '%.2f' }}, which exceeds the daily budget of $50."

  - alert: AWSDailyCostCritical
    expr: aws_daily_cost > 100
    for: 15m
    labels:
      severity: critical
      category: finops
    annotations:
      summary: "AWS Daily Cost Critical"
      description: "URGENT: The AWS cost for today is ${{ $value | printf '%.2f' }}, which significantly exceeds the daily budget of $50."

  - alert: AWSServiceCostExceeded
    expr: aws_service_cost > 300
    for: 1h
    labels:
      severity: warning
      category: finops
    annotations:
      summary: "AWS Service Cost Exceeded"
      description: "The AWS cost for service {{ $labels.service }} is ${{ $value | printf '%.2f' }}, which exceeds the service budget of $300."

- name: openai_cost_alerts
  rules:
  - alert: OpenAIDailyCostExceeded
    expr: openai_daily_cost > 50
    for: 15m
    labels:
      severity: warning
      category: finops
    annotations:
      summary: "OpenAI Daily Cost Exceeded"
      description: "The OpenAI API cost for today is ${{ $value | printf '%.2f' }}, which exceeds the daily budget of $50."

  - alert: OpenAIDailyCostCritical
    expr: openai_daily_cost > 100
    for: 10m
    labels:
      severity: critical
      category: finops
    annotations:
      summary: "OpenAI Daily Cost Critical"
      description: "URGENT: The OpenAI API cost for today is ${{ $value | printf '%.2f' }}, which significantly exceeds the daily budget of $50."

  - alert: OpenAIModelCostExceeded
    expr: openai_model_cost > 30
    for: 15m
    labels:
      severity: warning
      category: finops
    annotations:
      summary: "OpenAI Model Cost Exceeded"
      description: "The OpenAI API cost for model {{ $labels.model }} is ${{ $value | printf '%.2f' }}, which exceeds the model budget of $30."

  - alert: OpenAIDailyTokensExceeded
    expr: openai_tokens_total_1d > 3000000
    for: 15m
    labels:
      severity: warning
      category: finops
    annotations:
      summary: "OpenAI Daily Token Usage Exceeded"
      description: "The OpenAI API token usage for today is {{ $value }}, which exceeds the daily budget of 3M tokens."

- name: performance_alerts
  rules:
  - alert: HighAPILatency
    expr: http_request_duration_seconds{quantile="0.95"} > 1
    for: 5m
    labels:
      severity: warning
      category: performance
    annotations:
      summary: "High API Latency"
      description: "The 95th percentile latency for {{ $labels.handler }} is {{ $value | printf '%.2f' }}s over the last 5 minutes."

  - alert: CriticalAPILatency
    expr: http_request_duration_seconds{quantile="0.95"} > 3
    for: 2m
    labels:
      severity: critical
      category: performance
    annotations:
      summary: "Critical API Latency"
      description: "URGENT: The 95th percentile latency for {{ $labels.handler }} is {{ $value | printf '%.2f' }}s over the last 2 minutes."

  - alert: HighErrorRate
    expr: (sum(rate(http_requests_total{status=~"5.."}[5m])) by (service, handler) / sum(rate(http_requests_total[5m])) by (service, handler)) > 0.05
    for: 5m
    labels:
      severity: warning
      category: performance
    annotations:
      summary: "High Error Rate"
      description: "Service {{ $labels.service }} endpoint {{ $labels.handler }} has error rate above 5% ({{ $value | printf '%.2f' }}%)."