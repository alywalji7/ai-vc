[server]
protocol = http
http_port = 3000
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
admin_password = admin
allow_embedding = true

[auth]
disable_login_form = false

[smtp]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = true

[alerting]
enabled = true
execute_alerts = true

[unified_alerting]
enabled = true

[log]
mode = console
level = info

[dashboards]
min_refresh_interval = 5s