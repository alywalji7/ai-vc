---
tasks:
  # GitHub data ingestion tasks
  github_openai_ingest:
    name: Ingest OpenAI GitHub Data
    description: Fetches organization and repository data from OpenAI's GitHub account
    cron: "0 */12 * * *"  # Every 12 hours
    task: tasks.ingest_github
    args: ["openai"]
    enabled: true

  github_vercel_ingest:
    name: Ingest Vercel GitHub Data
    description: Fetches organization and repository data from Vercel's GitHub account
    cron: "0 */12 * * *"  # Every 12 hours
    task: tasks.ingest_github
    args: ["vercel"]
    enabled: true

  github_nextjs_ingest:
    name: Ingest Next.js GitHub Data
    description: Fetches repository data for the Next.js project
    cron: "0 */6 * * *"  # Every 6 hours
    task: tasks.ingest_github
    args: ["vercel/next.js"]
    enabled: true

  # Crunchbase data ingestion tasks
  crunchbase_openai_ingest:
    name: Ingest OpenAI Crunchbase Data
    description: Fetches company data for OpenAI from Crunchbase
    cron: "0 0 * * *"  # Once a day at midnight
    task: tasks.ingest_crunchbase
    args: ["openai"]
    enabled: true

  crunchbase_vercel_ingest:
    name: Ingest Vercel Crunchbase Data
    description: Fetches company data for Vercel from Crunchbase
    cron: "0 0 * * *"  # Once a day at midnight
    task: tasks.ingest_crunchbase
    args: ["vercel"]
    enabled: true

  # Product Hunt data ingestion tasks
  product_hunt_ingest:
    name: Ingest Product Hunt Data
    description: Fetches product launch data from Product Hunt
    cron: "0 */1 * * *"  # Hourly
    task: tasks.ingest_product_hunt
    args: [7]  # Look back 7 days
    enabled: true

  # SEC Form D data ingestion tasks
  form_d_ingest:
    name: Ingest SEC Form D Filings
    description: Fetches Form D filings from SEC EDGAR database
    cron: "0 2 * * *"  # Once a day at 2 AM
    task: tasks.ingest_form_d
    args: [7]  # Look back 7 days
    enabled: true

  # Compliance tasks
  update_ofac_sanctions:
    name: Update OFAC Sanctions List
    description: Fetches the latest OFAC SDN list from treasury.gov and updates the cache
    cron: "0 3 * * *"  # Once a day at 3 AM
    task: tasks.update_ofac_sanctions
    args: []  # No arguments needed
    enabled: true

  # Data cleanup task
  cleanup_old_data:
    name: Clean Up Old Data
    description: Removes data older than 30 days from the database
    cron: "0 1 * * 0"  # At 1 AM on Sundays
    task: tasks.cleanup_old_data
    args: [30]  # Keep 30 days of data
    enabled: true